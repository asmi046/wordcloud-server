<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Опрос: Любимый фильм</title>
    <link rel="stylesheet" href="style.css">
  </head>
<body>
  <div class="container">
    <h1>🎬 Опрос</h1>
    <p class="question">Какой фильм тебе нравится больше всего?</p>
    
    <input type="text" id="movieInput" placeholder="Например: Матрица">
    <button id="submitBtn">Отправить ответ</button>
    
    <div class="counter">Ответов: <span id="count">0</span> / 10</div>
    <a href="result.html">Посмотреть результаты →</a>
  </div>

  <script>
    const API_URL = window.location.origin.startsWith('http')
      ? `${window.location.origin}/api`
      : 'http://localhost:3000/api';
    const movieInput = document.getElementById('movieInput');
    const submitBtn = document.getElementById('submitBtn');
    const countElement = document.getElementById('count');

    // Загрузка счётчика
    async function loadCount() {
      try {
        const response = await fetch(`${API_URL}/movies`);
        const movies = await response.json();
        countElement.textContent = movies.length;

        if (movies.length >= 10) {
          alert('Опрос завершён! Переходим к результатам...');
          window.location.href = 'result.html';
        }
      } catch (error) {
        console.error('Ошибка загрузки:', error);
      }
    }

    // Отправка ответа
    submitBtn.addEventListener('click', async () => {
      const title = movieInput.value.trim();
      
      if (!title) {
        alert('Введите название фильма!');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Отправка...';

      try {
        const response = await fetch(`${API_URL}/movies`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title })
        });

        const data = await response.json();

        if (response.ok) {
          alert('✅ Ваш ответ принят!');
          movieInput.value = '';
          loadCount();

          if (data.count >= 10) {
            setTimeout(() => window.location.href = 'result.html', 1000);
          }
        } else {
          alert(data.error || 'Ошибка отправки');
        }
      } catch (error) {
        console.error('Ошибка:', error);
        alert('Ошибка соединения с сервером');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Отправить ответ';
      }
    });

    // Загрузка при старте
    loadCount();
    setInterval(loadCount, 2000); // Обновление каждые 2 секунды
  </script>
</body>
</html>
