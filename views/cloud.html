<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Облако тегов | МАХ Survey</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="header">
    <h1>☁️ Облако тегов</h1>
    <p>Результаты опроса в реальном времени</p>
    
  </div>

  <div class="container">
    <div class="card">
      <div class="question" id="questionText">
        Загрузка вопроса...
      </div>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-value" id="totalAnswers">0</div>
        <div class="stat-label">Всего ответов</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="uniqueAnswers">0</div>
        <div class="stat-label">Уникальных ответов</div>
      </div>
    </div>

    <div id="tagCloud">
      <div class="empty-state">
        <div class="empty-state-icon">💭</div>
        <div class="empty-state-text">Ожидание ответов участников...</div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/cloud.js"></script>
</body>
</html>
